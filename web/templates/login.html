<!DOCTYPE html><html lang="id"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Masuk — {{ store_name }}</title>
<style>body{font-family:-apple-system,Segoe UI,Roboto,Arial,sans-serif;background:#f4f6f9;margin:0;}.wrap{max-width:360px;margin:90px auto;background:#fff;border:1px solid #e4e8ee;border-radius:14px;padding:28px;}h1{font-size:19px;margin:0 0 6px;}label{font-size:13px;color:#6b7684;}input{width:100%;padding:10px;border:1px solid #e4e8ee;border-radius:8px;font:inherit;margin:8px 0 14px;}button{width:100%;background:#2f7bd6;color:#fff;border:none;padding:11px;border-radius:8px;font-weight:600;cursor:pointer;}.flash{background:#fdecea;color:#c0392b;padding:8px 12px;border-radius:8px;font-size:14px;margin-bottom:12px;}.hint{font-size:12px;color:#6b7684;margin-top:14px;}</style></head>
<body><div class="wrap"><h1>🛒 {{ store_name }}</h1><div class="muted" style="color:#6b7684;font-size:13px;margin-bottom:14px;">Dashboard Admin</div>
<form method="post"><label>Kata sandi</label><input type="password" name="password" autofocus><button>Masuk</button></form>
<p class="hint">Atur kata sandi lewat ADMIN_WEB_PASSWORD di file .env</p></div></body></html>
